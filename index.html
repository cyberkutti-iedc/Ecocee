<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@mui/system@5.0.0-alpha.15/dist/system.css" integrity="sha384-oNuj+MdH+8k6PbbsfL8Kpx6OO5SzgRS65s+FkKdEfI2qFExexlA25Yo2orCz6Bwi" crossorigin="anonymous">

  <title>Ecocee Learning Hub Registration</title>
  <style>
    body {
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      margin: 0;
    }

    .registration-form {
      width: 400px;
      padding: 20px;
      box-shadow: 0px 0px 10px rgba(0, 0, 0, 0.1);
      border-radius: 8px;
    }

    .form-control {
      margin-bottom: 16px;
    }
  </style>
</head>
<body>
  <div class="registration-form">
    <h2>Ecocee Learning Hub Registration</h2>
    <form id="registrationForm">
      <div class="form-control">
        <label for="name">Name</label>
        <input type="text" id="name" required>
      </div>

      <div class="form-control">
        <label for="email">Email ID</label>
        <input type="email" id="email" required>
      </div>

      <div class="form-control">
        <label for="phone">Phone Number</label>
        <input type="tel" id="phone" required>
      </div>

      <div class="form-control">
        <label for="institution">School/College/Others</label>
        <input type="text" id="institution" required>
      </div>

      <div class="form-control">
        <label for="stream">Stream</label>
        <input type="text" id="stream" required>
      </div>

      <div class="form-control">
        <label for="school">School/College Name</label>
        <input type="text" id="school" required>
      </div>

      <div class="form-control">
        <label for="course">Course (Python)</label>
        <select id="course" required>
          <option value="python">Python</option>
        </select>
      </div>

      <div class="form-control">
        <label for="source">How did you hear about us?</label>
        <input type="text" id="source" required>
      </div>

      <div class="form-control">
        <label>
          <input type="checkbox" required>
          I agree to the terms and conditions
        </label>
      </div>

      <div class="form-control">
        <button type="submit">Submit</button>
      </div>
    </form>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/react@17.0.2/umd/react.production.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/react-dom@17.0.2/umd/react-dom.production.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@mui/material@5.0.0-alpha.15/dist/umd/material.min.js"></script>
  <script>
    const form = document.getElementById('registrationForm');
    form.addEventListener('submit', function (event) {
      event.preventDefault();
      // Add your form submission logic here
    });
  </script>
</body>
</html>
