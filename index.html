<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Ecocee Learning Hub Registration</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@fluentui/react/dist/fabric.css">
  <style>
    body {
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      margin: 0;
      background-color: #f4f4f4;
    }

    .registration-container {
      width: 400px;
      padding: 20px;
      box-shadow: 0px 0px 10px rgba(0, 0, 0, 0.1);
      border-radius: 8px;
      background-color: #fff;
    }

    .form-control {
      margin-bottom: 16px;
    }

    label {
      display: block;
      margin-bottom: 8px;
      color: #333;
      font-weight: bold;
    }

    input,
    select,
    button {
      width: 100%;
      padding: 10px;
      box-sizing: border-box;
      border: 1px solid #ccc;
      border-radius: 4px;
      margin-top: 6px;
      margin-bottom: 12px;
      font-size: 14px;
    }

    button {
      background-color: #0078d4;
      color: #fff;
      cursor: pointer;
      transition: background-color 0.3s ease;
    }

    button:hover {
      background-color: #005a9e;
    }
  </style>
</head>
<body>
  <div class="registration-container">
    <h2 style="color: #333;">Ecocee Learning Hub Registration</h2>

    <div class="form-control">
      <label for="name">Name</label>
      <input type="text" id="name" placeholder="Enter your name" required>
    </div>

    <div class="form-control">
      <label for="email">Email ID</label>
      <input type="email" id="email" placeholder="Enter your email" required>
    </div>

    <div class="form-control">
      <label for="phone">Phone Number</label>
      <input type="tel" id="phone" placeholder="Enter your phone number" required>
    </div>

    <div class="form-control">
      <label for="institution">School/College/Others</label>
      <input type="text" id="institution" placeholder="Enter your school/college" required>
    </div>

    <div class="form-control">
      <label for="stream">Which Stream</label>
      <input type="text" id="stream" placeholder="Enter your stream" required>
    </div>

    <div class="form-control">
      <label for="school">School/College Name</label>
      <input type="text" id="school" placeholder="Enter your school/college name" required>
    </div>

    <div class="form-control">
      <label for="course">Which Course (Python)</label>
      <select id="course" required>
        <option value="python">Python</option>
      </select>
    </div>

    <div class="form-control">
      <label for="source">How did you hear about us?</label>
      <input type="text" id="source" placeholder="Enter your source" required>
    </div>

    <div class="form-control">
      <label>
        <input type="checkbox" required>
        I agree to the terms and conditions
      </label>
    </div>

    <div class="form-control">
      <button type="submit">Submit</button>
    </div>
  </div>
</body>
</html>
