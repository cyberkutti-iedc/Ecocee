<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Ecocee Learning Hub Registration</title>
  <style>
    body {
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      margin: 0;
      background-color: #f0f0f0;
    }

    .registration-form {
      background-color: #fff;
      width: 400px;
      padding: 20px;
      box-shadow: 0px 0px 10px rgba(0, 0, 0, 0.1);
      border-radius: 8px;
      font-family: Arial, sans-serif;
    }

    .form-control {
      margin-bottom: 16px;
    }

    label {
      display: block;
      margin-bottom: 8px;
      color: #333;
    }

    input,
    select,
    button {
      width: 100%;
      padding: 10px;
      box-sizing: border-box;
      border: 1px solid #ccc;
      border-radius: 4px;
      margin-top: 6px;
      margin-bottom: 12px;
      font-size: 14px;
    }

    button {
      background-color: #4caf50;
      color: #fff;
      cursor: pointer;
    }

    button:hover {
      background-color: #45a049;
    }
  </style>
</head>
<body>
  <div class="registration-form">
    <h2>Ecocee Learning Hub Registration</h2>
    <form id="registrationForm">
      <div class="form-control">
        <label for="name">Name</label>
        <input type="text" id="name" required>
      </div>

      <div class="form-control">
        <label for="email">Email ID</label>
        <input type="email" id="email" required>
      </div>

      <div class="form-control">
        <label for="phone">Phone Number</label>
        <input type="tel" id="phone" required>
      </div>

      <div class="form-control">
        <label for="institution">School/College/Others</label>
        <input type="text" id="institution" required>
      </div>

      <div class="form-control">
        <label for="stream">Stream</label>
        <input type="text" id="stream" required>
      </div>

      <div class="form-control">
        <label for="school">School/College Name</label>
        <input type="text" id="school" required>
      </div>

      <div class="form-control">
        <label for="course">Course (Python)</label>
        <select id="course" required>
          <option value="python">Python</option>
        </select>
      </div>

      <div class="form-control">
        <label for="source">How did you hear about us?</label>
        <input type="text" id="source" required>
      </div>

      <div class="form-control">
        <label>
          <input type="checkbox" required>
          I agree to the terms and conditions
        </label>
      </div>

      <div class="form-control">
        <button type="submit">Submit</button>
      </div>
    </form>
  </div>
</body>
</html>
