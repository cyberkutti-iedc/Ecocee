{%  load static %}

<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <!-- Add Bootstrap CSS -->
    <link rel="stylesheet" href="https://stackpath.bootstrapcdn.com/bootstrap/4.3.1/css/bootstrap.min.css">
    <!-- Add your custom CSS file -->
    <link rel="stylesheet" href="{% static 'css/styles.css' %}">
    <title>Ecocee Learning Hub Registration</title>
    <style>
        body {
            background-color: #f8f9fa; /* Light gray background */
        }

        .container {
            background-color: #ffffff; /* White container background */
            border-radius: 10px; /* Rounded corners */
            box-shadow: 0 0 10px rgba(0, 0, 0, 0.1); /* Shadow for the container */
            padding: 20px;
            margin-top: 50px;
        }

        h2 {
            color: #28a745; /* Green header text color */
        }

        .btn-primary {
            background-color: #28a745; /* Green button background color */
            border: none;
        }

        .btn-primary:hover {
            background-color: #218838; /* Darker green on hover */
        }
    </style>
</head>

<body>
    <div class="container mt-5">
        <h2 class="text-center mb-4"><strong>Ecocee Learning Hub Registration </strong></h2>

        <form id="regForm" method="post">
            {% csrf_token %}
            <!-- Step 1 -->
            <div class="step" id="step1">
                <div class="form-row">
                    <div class="form-group col-md-6">
                        <label for="fullName">Full Name</label>
                        <input type="text" class="form-control" id="fullName" name="fullName" required>
                    </div>
                    <div class="form-group col-md-6">
                        <label for="email">Email ID</label>
                        <input type="email" class="form-control" id="email" name="email" required>
                    </div>
                </div>

                <div class="form-group">
                    <label for="phoneNumber">Phone Number</label>
                    <input type="tel" class="form-control" id="phoneNumber" name="phoneNumber" required>
                </div>

                <div class="form-row">
                    <div class="form-group col-md-6">
                        <label for="gender">Gender</label>
                        <select class="form-control" id="gender" name="gender" required>
                            <option value="male">Male</option>
                            <option value="female">Female</option>
                            <option value="transgender">Transgender</option>
                            <option value="notSpecified">Prefer not to say</option>
                        </select>
                    </div>

                    <div class="form-group col-md-6">
                        <label for="course">Course</label>
                        <select class="form-control" id="course" name="course" required>
                            <option value="python">Python</option>
                        </select>
                    </div>
                </div>

                <div class="form-group">
                    <label for="eduQualification">Educational Qualification</label>
                    <select class="form-control" id="eduQualification" name="eduQualification" required>
                        <option value="+2">+2</option>
                        <option value="btech">B.Tech</option>
                        <option value="mtech">M.Tech</option>
                        <option value="bca_mca">BCA/MCA</option>
                        <option value="bsc_msc">BSc/MSc</option>
                        <option value="diploma">Diploma</option>
                        <option value="others">Others</option>
                    </select>
                    <!-- Additional input for Other qualification -->
                    <input type="text" class="form-control mt-2" id="otherQualification" name="otherQualification" placeholder="Enter Other Qualification">
                </div>


                <div class="form-group">
                    <label for="employmentStatus">Employment Status</label>
                    <select class="form-control" id="employmentStatus" name="employmentStatus" required>
                        <option value="iam_student">I am a Student</option>
                        <option value="employment">Employment</option>
                        <option value="unemployment">Unemployment</option>
                        <option value="lookingforjob">Looking of Job</option>
                        <option value="business_or_Startups">Business or Startups</option>
                        
                    </select>
                   
                </div>

                <div class="form-group">
                    <label for="college">Name of College/Organization</label>
                    <input type="text" class="form-control" id="college" name="college" required>
                </div>

                <div class="form-group">
                    <label for="graduationYear">Year of Graduation</label>
                    <input type="text" class="form-control" id="graduationYear" name="graduationYear" required>
                </div>

                <button type="submit" class="btn btn-primary">Submit</button>
            </div>
        </form>
    </div>

    <!-- Add Bootstrap JS and Popper.js scripts (place them before the closing </body> tag) -->
    <script src="https://code.jquery.com/jquery-3.3.1.slim.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/popper.js/1.14.7/umd/popper.min.js"></script>
    <script src="https://stackpath.bootstrapcdn.com/bootstrap/4.3.1/js/bootstrap.min.js"></script>
</body>

</html>
